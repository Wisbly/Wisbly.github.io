<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor - Añade Jugadores PIOLA</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 20px; margin: 0; min-height: 100vh; }
        h1 { margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .setup-section { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; max-width: 500px; margin: 20px auto; backdrop-filter: blur(10px); }
        input[type="text"] { padding: 15px; font-size: 18px; width: 70%; margin: 10px; border: 2px solid rgba(255,255,255,0.4); border-radius: 12px; background: rgba(255,255,255,0.9); }
        button { background: linear-gradient(45deg, #ff6b6b, #ee5a52); color: white; padding: 15px 35px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer; margin: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-weight: bold; transition: all 0.3s; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        button:disabled { background: #666; cursor: not-allowed; transform: none; }
        .jugadores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 25px; max-width: 800px; margin: 30px auto; }
        .jugador-btn { background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.3); color: white; padding: 25px 15px; font-size: 24px; font-weight: bold; border-radius: 18px; cursor: pointer; transition: all 0.4s; position: relative; backdrop-filter: blur(10px); }
        .jugador-btn:hover:not(.activo) { background: rgba(255,255,255,0.3); transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .jugador-btn.activo { background: linear-gradient(45deg, #00ff88, #00cc66) !important; border-color: #00ff88 !important; color: #000 !important; transform: scale(1.08) !important; animation: pulse-activo 1s infinite; box-shadow: 0 12px 25px rgba(0,255,0,0.5) !important; }
        .jugador-btn.visto::after { content: '✅'; position: absolute; top: -8px; right: -8px; background: #4caf50; color: white; border-radius: 50%; width: 28px; height: 28px; line-height: 28px; font-weight: bold; }
        #pantalla-info { margin: 25px auto; max-width: 550px; font-size: 22px; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); border-radius: 20px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #palabra { font-size: 58px !important; font-weight: bold; text-transform: uppercase; letter-spacing: 6px; margin: 20px 0; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        #ocultar-btn { display: none; background: linear-gradient(45deg, #ff9ff3, #f368e0); color: white; padding: 18px 45px; font-size: 20px; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 18px rgba(0,0,0,0.4); margin-top: 20px; }
        #chat-section { margin-top: 35px; background: rgba(255,255,255,0.12); padding: 30px; border-radius: 25px; max-width: 650px; margin-left: auto; margin-right: auto; display: none; }
        #chat-input { padding: 14px; font-size: 18px; width: 65%; border: 3px solid rgba(255,255,255,0.5); border-radius: 12px; margin: 12px; background: rgba(255,255,255,0.95); }
        #mensajes { background: rgba(0,0,0,0.35); height: 200px; overflow-y: scroll; padding: 18px; border-radius: 15px; margin: 15px 0; font-size: 16px; line-height: 1.5; }
        #progreso { font-size: 20px; color: #ffeb3b; margin: 15px 0; font-weight: bold; }
        @keyframes pulse-activo { 0% { box-shadow: 0 12px 25px rgba(0,255,0,0.5); } 50% { box-shadow: 0 18px 35px rgba(0,255,0,0.7); } 100% { box-shadow: 0 12px 25px rgba(0,255,0,0.5); } }
        .lista-jugadores { max-height: 200px; overflow-y: auto; text-align: left; margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; }
        .jugador-lista { padding: 8px; margin: 5px 0; background: rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .jugador-lista:hover { background: rgba(255,255,255,0.2); }
        .eliminar { background: #ff4757; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🕵️‍♂️ JUEGO DEL IMPOSITOR 🕵️‍♀️</h1>
    
    <div class="setup-section" id="setup">
        <h3>👥 Añade Jugadores (mín 3)</h3>
        <input type="text" id="nuevo-jugador" placeholder="Nombre jugador (ej: Pedro)" maxlength="15">
        <br>
        <button onclick="agregarJugador()">➕ Añadir</button>
        <button onclick="iniciarJuego()" id="btn-iniciar" disabled>🚀 INICIAR (0/3)</button>
        <div class="lista-jugadores" id="lista-jugadores"></div>
    </div>
    
    <button id="reiniciar-btn" onclick="reiniciarTodo()" style="display: none;">🔄 Nuevo Juego Completo</button>
    
    <div class="jugadores-grid" id="jugadores-grid" style="display: none;"></div>
    
    <div id="pantalla-info" style="display: none;">
        <div id="info-texto"></div>
        <div id="progreso"></div>
    </div>
    
    <button id="ocultar-btn" onclick="ocultarRol()">🙈 Ocultar Mi Rol</button>
    
    <div id="chat-section">
        <h3 style="color: #ffeb3b;">💬 Chat - Dan Clues (todos ya vieron)</h3>
        <input type="text" id="chat-input" placeholder="Di 1 palabra relacionada con TU palabra..." onkeypress="if(event.key==='Enter') enviarChat()">
        <div id="mensajes"></div>
        <button onclick="revelarTodo()" style="background: linear-gradient(45deg, #ffa726, #fb8c00); padding: 16px 40px; font-size: 20px;">🎭 REVELAR IMPOSITOR</button>
    </div>

    <script>
        let jugadores = ['Bata', 'Cami', 'Wis', 'Grethel']; // Iniciales
        let categoriaActual = '';
        let palabraSecreta = '';
        let pistaImpostor = '';
        let impostorIndex = -1;
        let vistos = new Set();
        let juegoIniciado = false;

        const categorias = {
            'Comida Chilena': ['completo', 'chorrillana', 'empanada', 'pastel', 'porotos', 'prieta', 'humita', 'cazuela', 'sopaipilla', 'mote'],
            'Jerga Chilena': ['weón', 'cachai', 'filete', 'fome', 'bajón', 'chanta', 'flaite', 'bkn', 'filo', 'huevón'],
            'Series Chilenas': ['BKN', 'EsCool', 'MalaConducta', 'CorazónRebelde', 'Ramona', 'Los80', 'WenaPro', 'Pelucon'],
            'Lugares Santiago': ['SanCristóbal', 'Bellavista', 'PlazaItalia', 'Costanera', 'Providencia', 'BarrioItalia', 'BellasArtes']
        };

        function agregarJugador() {
            if (juegoIniciado) return; // FIX: Don't allow adding during game
            const input = document.getElementById('nuevo-jugador');
            const nombre = input.value.trim();
            // Sanitize: only allow letters, numbers, and spaces
            const nombreLimpio = nombre.replace(/[^a-zA-ZáéíóúñÑ0-9\s]/g, '');
            if (nombreLimpio && nombreLimpio.length <= 12 && !jugadores.includes(nombreLimpio)) {
                jugadores.push(nombreLimpio);
                input.value = '';
                actualizarListaSetup();
                actualizarBtnIniciar();
            } else {
                alert('Nombre inválido o repetido (máx 12 letras)');
            }
        }

        function eliminarJugador(index) {
            if (juegoIniciado) return; // FIX: Don't allow removing during game
            jugadores.splice(index, 1);
            actualizarListaSetup();
            actualizarBtnIniciar();
        }

        function actualizarListaSetup() {
            const lista = document.getElementById('lista-jugadores');
            lista.innerHTML = ''; // Clear list
            jugadores.forEach((jug, i) => {
                const div = document.createElement('div');
                div.className = 'jugador-lista';
                div.textContent = jug;
                
                const btn = document.createElement('button');
                btn.className = 'eliminar';
                btn.title = 'Eliminar';
                btn.textContent = '×';
                btn.onclick = () => eliminarJugador(i);
                
                div.appendChild(document.createTextNode(' '));
                div.appendChild(btn);
                lista.appendChild(div);
            });
        }

        function actualizarBtnIniciar() {
            const btn = document.getElementById('btn-iniciar');
            const count = jugadores.length;
            btn.textContent = `🚀 INICIAR (${count}/3+)`;
            btn.disabled = count < 3;
        }

        function iniciarJuego() {
            const keys = Object.keys(categorias);
            categoriaActual = getRandom(keys);
            palabraSecreta = getRandom(categorias[categoriaActual]);
            pistaImpostor = categoriaActual.toLowerCase(); // Sutil: solo categoría
            impostorIndex = Math.floor(Math.random() * jugadores.length);
            vistos.clear();
            juegoIniciado = true;
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('jugadores-grid').style.display = 'grid';
            document.getElementById('pantalla-info').style.display = 'flex';
            document.getElementById('reiniciar-btn').style.display = 'inline-block';
            
            crearBotonesJugadores();
            document.getElementById('info-texto').textContent = '¡Roles generados PIOLA! Click TU nombre para ver en privado.';
        }

        function crearBotonesJugadores() {
            const grid = document.getElementById('jugadores-grid');
            grid.innerHTML = ''; // Clear grid
            jugadores.forEach((jug, i) => {
                const div = document.createElement('div');
                div.className = 'jugador-btn';
                div.setAttribute('data-index', i);
                div.textContent = jug;
                div.onclick = () => mostrarRol(i);
                grid.appendChild(div);
            });
        }

        function mostrarRol(index) {
            if (!juegoIniciado) return;
            const esImpostor = index === impostorIndex;
            vistos.add(index);
            
            document.querySelectorAll('.jugador-btn').forEach(btn => btn.classList.remove('activo'));
            const btnActual = document.querySelector(`[data-index="${index}"]`);
            if (btnActual) {
                btnActual.classList.add('activo');
                btnActual.classList.add('visto');
            }
            
            const info = document.getElementById('info-texto');
            info.innerHTML = ''; // Clear previous content
            
            if (esImpostor) {
                const nombreDiv = document.createElement('div');
                nombreDiv.style.fontSize = '34px';
                nombreDiv.textContent = `🕵️‍♂️ ${jugadores[index].toUpperCase()} 🕵️‍♂️`;
                
                const palabraDiv = document.createElement('div');
                palabraDiv.id = 'palabra';
                palabraDiv.style.color = '#ff6b6b';
                palabraDiv.textContent = 'IMPOSTOR';
                
                const pistaP = document.createElement('p');
                pistaP.style.fontSize = '22px';
                pistaP.style.margin = '15px 0';
                pistaP.innerHTML = 'Pista sutil: <em></em>';
                pistaP.querySelector('em').textContent = `"${pistaImpostor}"`;
                
                const avisoSmall = document.createElement('small');
                avisoSmall.textContent = '¡Nadie sabe que eres impostor! Finge.';
                
                info.appendChild(nombreDiv);
                info.appendChild(palabraDiv);
                info.appendChild(pistaP);
                info.appendChild(avisoSmall);
            } else {
                const nombreDiv = document.createElement('div');
                nombreDiv.style.fontSize = '34px';
                nombreDiv.textContent = `👥 ${jugadores[index].toUpperCase()} 👥`;
                
                const palabraDiv = document.createElement('div');
                palabraDiv.id = 'palabra';
                palabraDiv.style.color = '#44ff44';
                palabraDiv.textContent = palabraSecreta;
                
                const categoriaP = document.createElement('p');
                categoriaP.style.fontSize = '22px';
                categoriaP.textContent = `(${categoriaActual})`;
                
                info.appendChild(nombreDiv);
                info.appendChild(palabraDiv);
                info.appendChild(categoriaP);
            }
            actualizarProgreso();
            document.getElementById('ocultar-btn').style.display = 'block';
        }

        function ocultarRol() {
            document.querySelectorAll('.jugador-btn').forEach(btn => btn.classList.remove('activo'));
            document.getElementById('ocultar-btn').style.display = 'none';
            
            const count = vistos.size;
            const info = document.getElementById('info-texto');
            if (count === jugadores.length) {
                info.innerHTML = ''; // Clear
                const div = document.createElement('div');
                div.style.fontSize = '28px';
                div.style.color = '#ffeb3b';
                div.textContent = '🎊 ¡TODOS VIERON! Chat abajo para dar pistas.';
                info.appendChild(div);
                document.getElementById('chat-section').style.display = 'block';
            } else {
                info.textContent = `${count}/${jugadores.length} vistos. Siguiente click SU nombre.`;
            }
        }

        function actualizarProgreso() {
            document.getElementById('progreso').textContent = `Vistos: ${vistos.size}/${jugadores.length}`;
        }

        function enviarChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg) {
                const mensajes = document.getElementById('mensajes');
                const p = document.createElement('p');
                p.textContent = '• ';
                const strong = document.createElement('strong');
                strong.textContent = `${getRandom(jugadores)}:`;
                p.appendChild(strong);
                p.appendChild(document.createTextNode(' ' + msg));
                mensajes.appendChild(p);
                mensajes.scrollTop = mensajes.scrollHeight;
                input.value = '';
            }
        }

        function revelarTodo() {
            const impNombre = jugadores[impostorIndex];
            alert(`🎭 ¡REVELADO!
Impostor: ${impNombre.toUpperCase()} 🕵️‍♂️
Palabra: "${palabraSecreta}"
Categoría: ${categoriaActual}

¡Reinicia para nuevo!`);
        }

        function reiniciarTodo() {
            location.reload();
        }

        function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // Inicial
        actualizarListaSetup();
        actualizarBtnIniciar();
    </script>
</body>
</html>
